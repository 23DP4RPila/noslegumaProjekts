<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <title>Ienākt - Uzdevumu pārvaldnieks</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pāriet uz saturu</a>
  <header class="topbar">
    <a href="/" class="brand">Uzdevumi</a>
    <nav><a href="/register.html" class="btn btn--ghost">Reģistrēties</a></nav>
  </header>

  <main id="main" class="container container--narrow">
    <h1>Ienākt sistēmā</h1>
    <p class="muted">Ievadi savu e-pastu un paroli.</p>

    <div id="alert" class="alert alert--error" role="alert" hidden></div>

    <form id="loginForm" class="card" novalidate>
      <div class="field">
        <label for="email">E-pasts</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Parole</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Ienākt</button>
      <p class="small muted" style="margin-top:14px;">Nav konta? <a href="/register.html">Reģistrēties</a></p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
