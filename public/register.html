<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <title>Reģistrēties - Uzdevumu pārvaldnieks</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pāriet uz saturu</a>
  <header class="topbar">
    <a href="/" class="brand">Uzdevumi</a>
    <nav><a href="/login.html" class="btn btn--ghost">Ienākt</a></nav>
  </header>

  <main id="main" class="container container--narrow">
    <h1>Izveidot kontu</h1>
    <p class="muted">Aizpildi formu, lai sāktu izmantot uzdevumu pārvaldnieku.</p>

    <div id="alert" class="alert alert--error" role="alert" hidden></div>

    <form id="registerForm" class="card" novalidate>
      <div class="field">
        <label for="username">Lietotājvārds</label>
        <input id="username" name="username" type="text" autocomplete="username" required minlength="3" maxlength="30" />
        <div class="hint">3–30 rakstzīmes; burti, cipari, _ - .</div>
      </div>
      <div class="field">
        <label for="email">E-pasts</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Parole</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" />
        <div class="hint">Vismaz 8 rakstzīmes, lielie un mazie burti, cipars.</div>
      </div>
      <button type="submit">Reģistrēties</button>
      <p class="small muted" style="margin-top:14px;">Jau ir konts? <a href="/login.html">Ienākt</a></p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
